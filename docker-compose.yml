services:
  api:
    build: { context: ., dockerfile: Dockerfile, target: api }
    environment:
      - DATABASE_URL=postgresql://siegeiq:siegeiq@db:5432/siegeiq
      - REDIS_URL=redis://redis:6379
      - API_PORT=4000
      - LIVE_WS_PORT=4100
    ports: ["4000:4000", "4100:4100"]
    depends_on: [db, redis]
  worker:
    build: { context: ., dockerfile: Dockerfile, target: api }
    command: ["npm", "run", "worker", "-w", "@siegeiq/api"]
    environment:
      - DATABASE_URL=postgresql://siegeiq:siegeiq@db:5432/siegeiq
      - REDIS_URL=redis://redis:6379
    depends_on: [db, redis]
  web:
    build: { context: ., dockerfile: Dockerfile, target: web }
    environment:
      - API_URL=http://api:4000
    ports: ["3000:3000"]
    depends_on: [api]
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=siegeiq
      - POSTGRES_PASSWORD=siegeiq
      - POSTGRES_DB=siegeiq
    volumes: [dbdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
volumes:
  dbdata:
